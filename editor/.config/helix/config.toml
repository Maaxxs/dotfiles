theme = "gruvbox_dark_hard_custom"


[editor]
true-color = true
search.wrap-around = false
cursorline = true
soft-wrap.enable = true
#"idle-timeout" = 50
# rulers = [80]
# bufferline = "multiple"
# auto-pairs = false
# line-number = "relative"
# scrolloff = 0
# 
# eventually this might be available, but it is not yet. 2026-05-13
# undofile = true

[keys.normal]
#"#" = "toggle_comments"
#"C-l" = "goto_next_buffer"
#"C-h" = "goto_previous_buffer"
##"C-j" = ":buffer-close"
#"A-L" = "extend_to_line_end"
#"A-H" = "extend_to_line_start"
"space" = { ";" = ":write" }
"0" = "goto_line_start"
"D" = "@vgld"
"G" = "@ge"
"V" = "@xv"
#g = { q = [":reflow", "goto_line_start"] }
## "V" = [ "extend_line_below","select_mode" ]
##esc = ["collapse_selection", "keep_primary_selection"]

[keys.insert]
j = { k = "normal_mode" } # exit insert mode via `jk`
";" = { d = [":insert-output date -I | tr -d '\n'", "normal_mode", "move_next_long_word_end", "move_char_right", "insert_mode" ]}
# ";" = { w = ":write" }


[editor.lsp]
display-inlay-hints = true


[editor.cursor-shape]
insert = "bar"


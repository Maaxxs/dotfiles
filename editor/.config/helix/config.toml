# theme = "gruvbox_dark_hard_custom"
theme = "alabaster-dark"

[editor]
true-color = true
search.wrap-around = false
cursorline = true
soft-wrap.enable = true
idle-timeout = 100
completion-timeout = 200
# rulers = [80]
# bufferline = "multiple"
auto-pairs = false
# line-number = "relative"
# scrolloff = 0
# 
# eventually this might be available, but it is not yet. 2026-05-13
# undofile = true
 
[editor.lsp]
display-inlay-hints = true

[editor.cursor-shape]
insert = "bar"

# [editor.whitespace]
# render = "all"

# or control each character
# [editor.whitespace.render]
# space = "all"
# tab = "all"
# nbsp = "none"
# nnbsp = "none"
# newline = "none"

# [editor.whitespace.characters]
# space = "·"
# nbsp = "⍽"
# nnbsp = "␣"
# tab = "→"
# newline = "⏎"
# tabpad = "·"
# tabpad = "A"



[keys.normal]
#"#" = "toggle_comments"
"C-l" = "goto_next_buffer"
"C-h" = "goto_previous_buffer"
##"C-j" = ":buffer-close"
#"A-L" = "extend_to_line_end"
#"A-H" = "extend_to_line_start"
"0" = "goto_line_start"
"D" = "@vgld"
"G" = "@ge"
"V" = "@xv"
#g = { q = [":reflow", "goto_line_start"] }
## "V" = [ "extend_line_below","select_mode" ]
##esc = ["collapse_selection", "keep_primary_selection"]
[keys.normal.g]
# go to definition in new buffer to the right
L = "@ wvgd"
# go to definition in new buffer to the bottom
J = "@ wsgd"
[keys.normal."space"]
# ";" = ":write"
";" = ":insert-output env LC_TIME=en_US date '+%%Y-%%m-%%d, %%A: ' | tr -d '\n'"
# ";" = [":insert-output date -I | tr -d '\n'", "move_char_right", "move_char_right", "move_char_right", "move_char_right", "move_char_right", "move_char_right", "move_char_right", "move_char_right", "move_char_right", "move_char_right", "insert_mode"]
# ";" = [":insert-output date -I | tr -d '\n'", "move_next_word_end", "move_next_word_end", "move_next_word_end", "move_next_word_end", "move_next_word_end", "move_char_right", "insert_mode"]
# ";" = [":insert-output date -I | tr -d '\n'", "normal_mode", "move_next_long_word_end", "move_char_right", "insert_mode" ]
o = "@i```\n```<esc>kA"
[keys.normal.m]
w = "@miwms"
W = "@miWms"

[keys.insert]
# a = ["normal_mode", "move_char_right", "insert_mode"]
[keys.insert.j]
k = "normal_mode" # exit insert mode via `jk`

